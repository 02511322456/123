<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Italic text</title>

	<style>
		p {
			font-size: 18px;
		}

		i {
			font-style: italic;
		}
	</style>
</head>
<body>

	<p>
		This is some <i>text</i> in paragraph.
	</p>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Red paragraph</title>

	<style>
		p {
			color: red;
		}
	</style>
</head>
<body>

	<p>
		This is a paragraph with text.
	</p>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Color example</title>

	<style>
		p {
			color: red;
		}

		i {
			color: blue;
		}
	</style>
</head>
<body>

	<p>
		This is some <i>text</i> in paragraph.
	</p>

</body>
</html>
