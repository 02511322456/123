<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Font weight example</title>

	<style>
		h2 {
			font-weight: normal;
		}

		p {
			font-weight: bold;
		}
	</style>

</head>
<body>

	<h2>Title</h2>

	<p>
		This is a paragraph with text.
	</p>

</body>
</html>
