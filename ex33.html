<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Headings and paragraphs</title>

	<style>
		h1 {
			font-weight: bold;
		}

		h2 {
			font-weight: normal;
		}

		p {
			font-style: italic;
		}
	</style>

</head>
<body>

	<h1>Main page title</h1>

	<p>
		This is a paragraph with text.
	</p>

	<h2>Secondary heading 1</h2>

	<p>
		This is a paragraph with text.
	</p>

	<p>
		This is a paragraph with text.
	</p>

	<h2>Secondary heading 2</h2>

	<p>
		This is a paragraph with text.
	</p>

	<p>
		This is a paragraph with text.
	</p>

</body>
</html>
