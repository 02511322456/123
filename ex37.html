<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Text styling</title>

	<style>
		p {
			font-family: "Times New Roman";
			font-size: 13px;
			line-height: 20px;
		}
	</style>

</head>
<body>

	<p>
		This is a paragraph with text.
	</p>

</body>
</html>

!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Paragraph styling</title>

	<style>
		p {
			width: 300px;
			font-family: Arial;
			color: red;
			font-size: 40px;
			font-weight: bold;
		}
	</style>

</head>
<body>

	<p>
		This is a paragraph with text.
	</p>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Paragraph styling</title>

	<style>
		p {
			font-family: Arial;
			font-size: 40px;
			font-weight: bold;
			text-indent: 50px;
			font-style: italic;
			line-height: 60px;
		}
	</style>

</head>
<body>

	<p>
		This is a paragraph with text.
	</p>

</body>
</html>
