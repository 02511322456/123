<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>List example</title>

	<style>
		i {
			font-style: normal;
		}

		li {
			font-style: italic;
		}
	</style>
</head>
<body>

	<ul>
		<li>paragraph <i>italic</i></li>
		<li>paragraph <i>italic</i></li>
		<li>paragraph <i>italic</i></li>
		<li>paragraph <i>italic</i></li>
	</ul>

</body>
</html>

<ul>
	<li>text <a href="">link</a></li>
	<li>text <a href="">link</a></li>
	<li>text <a href="">link</a></li>
	<li>text <a href=""><b>bold link</b></a></li>
</ul>

<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Nested tags</title>

	<style>
		p {
			font-size: 18px;
		}

		i {
			font-style: italic;
		}

		b {
			font-weight: bold;
		}

		a {
			text-decoration: underline;
			color: blue;
		}
	</style>
</head>
<body>

	<p>
		This is a paragraph with text
		<i><b>bold italic</b></i>
		<a href="">link <i>italic</i></a>.
	</p>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Link formatting</title>

	<style>
		a {
			text-decoration: none;
			color: blue;
		}

		i {
			font-style: italic;
		}

		b {
			font-weight: bold;
		}
	</style>
</head>
<body>

	<p>
		<a href="">link <i><b>bold italic</b></i></a>
	</p>

</body>
</html>
