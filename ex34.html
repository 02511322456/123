<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Font family example</title>

	<style>
		p {
			font-family: Arial;
		}
	</style>

</head>
<body>

	<p>
		This is a paragraph with text.
	</p>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Comic Sans example</title>

	<style>
		p {
			font-family: "Comic Sans MS";
		}
	</style>

</head>
<body>

	<p>
		This is a paragraph with text.
	</p>

</body>
</html>
